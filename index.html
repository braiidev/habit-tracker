  <script type="application/ld+json">

    "operatingSystem": "Web Browser",
    "browserRequirements": "Requires JavaScript",
    "inLanguage": ["es", "en"],
    "isAccessibleForFree": true,
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "featureList": [
      "Seguimiento de hábitos diarios",
      "Estadísticas y rachas",
      "Heatmap de actividad",
      "Resumen semanal",
      "Sincronización entre dispositivos",
      "Modo oscuro",
      "Sin anuncios"

    "author": {
      "@type": "Person",
      "name": "braiidev",
      "url": "https://github.com/braiidev"
    }

  <link rel="stylesheet" href="app/styles.css">

  ═══════════════════════════════════════════════════════════════════════ -->
  <link rel="alternate" hreflang="es" href="https://braiidev.github.io/habit-tracker/">

  <link rel="alternate" hreflang="x-default" href="https://braiidev.github.io/habit-tracker/">
</head>
<body>

  <nav id="nav"></nav>
  <main id="root"></main>
  <script type="module" src="app/main.js"></script>

</html>
