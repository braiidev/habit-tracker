    <rect x="336" y="96"  width="40" height="40" rx="6" fill="#1e293b"/>

    <rect x="0"   y="144" width="40" height="40" rx="6" fill="#2563eb"/>
    <rect x="48"  y="144" width="40" height="40" rx="6" fill="#3b82f6"/>
    <rect x="96"  y="144" width="40" height="40" rx="6" fill="#1e293b"/>
    <rect x="144" y="144" width="40" height="40" rx="6" fill="#2563eb"/>
    <rect x="192" y="144" width="40" height="40" rx="6" fill="#1e293b"/>
    <rect x="240" y="144" width="40" height="40" rx="6" fill="#2563eb"/>
    <rect x="288" y="144" width="40" height="40" rx="6" fill="#3b82f6"/>
    <rect x="336" y="144" width="40" height="40" rx="6" fill="#2563eb"/>

    <rect x="0"   y="192" width="40" height="40" rx="6" fill="#1e293b"/>
    <rect x="48"  y="192" width="40" height="40" rx="6" fill="#2563eb"/>
    <rect x="96"  y="192" width="40" height="40" rx="6" fill="#1d4ed8"/>
    <rect x="144" y="192" width="40" height="40" rx="6" fill="#2563eb"/>
    <rect x="192" y="192" width="40" height="40" rx="6" fill="#2563eb"/>
    <rect x="240" y="192" width="40" height="40" rx="6" fill="#1e293b"/>
    <rect x="288" y="192" width="40" height="40" rx="6" fill="#2563eb"/>
    <rect x="336" y="192" width="40" height="40" rx="6" fill="#3b82f6"/>

    <rect x="0"   y="240" width="40" height="40" rx="6" fill="#2563eb"/>
    <rect x="48"  y="240" width="40" height="40" rx="6" fill="#1e293b"/>
    <rect x="96"  y="240" width="40" height="40" rx="6" fill="#2563eb"/>
    <rect x="144" y="240" width="40" height="40" rx="6" fill="#1d4ed8"/>
