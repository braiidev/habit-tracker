    <rect x="240" y="48"  width="40" height="40" rx="6" fill="#2563eb"/>
    <rect x="288" y="48"  width="40" height="40" rx="6" fill="#1e293b"/>
    <rect x="336" y="48"  width="40" height="40" rx="6" fill="#2563eb"/>

    <rect x="0"   y="96"  width="40" height="40" rx="6" fill="#1e293b"/>
    <rect x="48"  y="96"  width="40" height="40" rx="6" fill="#2563eb"/>
    <rect x="96"  y="96"  width="40" height="40" rx="6" fill="#2563eb"/>
    <rect x="144" y="96"  width="40" height="40" rx="6" fill="#1e293b"/>
