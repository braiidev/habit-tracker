    <rect x="0"   y="288" width="40" height="40" rx="6" fill="#1d4ed8"/>
    <rect x="48"  y="288" width="40" height="40" rx="6" fill="#2563eb"/>
    <rect x="96"  y="288" width="40" height="40" rx="6" fill="#2563eb"/>
    <rect x="144" y="288" width="40" height="40" rx="6" fill="#1e293b"/>
    <rect x="192" y="288" width="40" height="40" rx="6" fill="#2563eb"/>
    <rect x="240" y="288" width="40" height="40" rx="6" fill="#2563eb"/>
    <rect x="288" y="288" width="40" height="40" rx="6" fill="#1e293b"/>
    <rect x="336" y="288" width="40" height="40" rx="6" fill="#3b82f6"/>
